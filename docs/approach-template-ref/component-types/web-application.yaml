apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: web-application
  annotations:
    openchoreo.dev/description: "A long-running component that serves web requests and exposes at least one HTTP endpoint"
spec:
  workloadType: deployment

  allowedWorkflows:
    - kind: ClusterWorkflow
      name: paketo-buildpacks-builder
    - kind: ClusterWorkflow
      name: gcp-buildpacks-builder
    - kind: ClusterWorkflow
      name: dockerfile-builder

  allowedTraits:
    - kind: ClusterTrait
      name: observability-alert-rule

  validations:
    - rule: "${workload.endpoints.exists(name, endpoint, endpoint.type == 'HTTP')}"
      message: "Web-application components must have at least one HTTP endpoint."

  environmentConfigs:
    openAPIV3Schema:
      type: object
      $defs:
        ResourceQuantity:
          type: object
          default: {}
          properties:
            cpu:
              type: string
              default: "100m"
            memory:
              type: string
              default: "256Mi"
        ResourceRequirements:
          type: object
          properties:
            requests:
              $ref: "#/$defs/ResourceQuantity"
            limits:
              $ref: "#/$defs/ResourceQuantity"
          default: {}
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 0
        resources:
          $ref: "#/$defs/ResourceRequirements"
        imagePullPolicy:
          type: string
          default: IfNotPresent
          enum:
            - Always
            - IfNotPresent
            - Never

  resources:
    - templateRef:
        kind: ClusterResourceTemplate
        name: standard-deployment
    - templateRef:
        kind: ClusterResourceTemplate
        name: env-config
    - templateRef:
        kind: ClusterResourceTemplate
        name: file-config
    - templateRef:
        kind: ClusterResourceTemplate
        name: secret-env-external
    - templateRef:
        kind: ClusterResourceTemplate
        name: secret-file-external
    # routing resources are unique to this type — web-application uses subdomain routing (no path prefix)
    - id: service
      includeWhen: ${size(workload.endpoints) > 0}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}
    - id: httproute-external
      forEach: '${workload.endpoints.transformMap(name, ep, "external" in ep.visibility && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint.key)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, oc_dns_label(endpoint.key, metadata.componentName, metadata.environmentName, metadata.componentNamespace) + "." + h)}
          rules:
            - backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}
    - id: httproute-internal
      forEach: '${workload.endpoints.transformMap(name, ep, "internal" in ep.visibility && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: '${oc_generate_name(metadata.componentName, endpoint.key, "internal")}'
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "internal"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.internal.name}
              namespace: ${gateway.ingress.internal.namespace}
          hostnames: |
            ${[gateway.ingress.internal.?http, gateway.ingress.internal.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, oc_dns_label(endpoint.key, metadata.componentName, metadata.environmentName, metadata.componentNamespace) + "." + h)}
          rules:
            - backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}
