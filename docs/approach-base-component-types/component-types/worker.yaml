apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: worker
  annotations:
    openchoreo.dev/description: "A long-running background or event-driven component with no endpoints"
spec:
  baseType:
    kind: ClusterBaseComponentType
    name: base-deployment

  # workloadType must be declared explicitly until the CRD relaxes the required
  # constraint for CTs that have a baseType. It must match the base's workloadType.
  workloadType: deployment

  # Inherits from base-deployment:
  #   environmentConfigs schema, service (skipped by includeWhen),
  #   deployment, env-config, file-config, secret-env-external, secret-file-external

  allowedWorkflows:
    - kind: ClusterWorkflow
      name: paketo-buildpacks-builder
    - kind: ClusterWorkflow
      name: gcp-buildpacks-builder
    - kind: ClusterWorkflow
      name: dockerfile-builder
    - kind: ClusterWorkflow
      name: ballerina-buildpack-builder

  allowedTraits:
    - kind: ClusterTrait
      name: observability-alert-rule

  validations:
    - rule: "${size(workload.endpoints) == 0}"
      message: "Worker components must not have endpoints. Use 'service' for components with endpoints."
