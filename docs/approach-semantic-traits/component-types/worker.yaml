apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: worker
  annotations:
    openchoreo.dev/description: "A long-running background or event-driven component with no endpoints"
spec:
  workloadType: deployment

  allowedWorkflows:
    - kind: ClusterWorkflow
      name: paketo-buildpacks-builder
    - kind: ClusterWorkflow
      name: gcp-buildpacks-builder
    - kind: ClusterWorkflow
      name: dockerfile-builder
    - kind: ClusterWorkflow
      name: ballerina-buildpack-builder

  allowedTraits:
    - kind: ClusterTrait
      name: observability-alert-rule

  traits:
    - name: configuration
      instanceName: configuration

  validations:
    - rule: "${size(workload.endpoints) == 0}"
      message: "Worker components must not have endpoints. Use 'service' for components with endpoints."

  environmentConfigs:
    openAPIV3Schema:
      type: object
      $defs:
        ResourceQuantity:
          type: object
          default: {}
          properties:
            cpu:
              type: string
              default: "100m"
            memory:
              type: string
              default: "256Mi"
        ResourceRequirements:
          type: object
          properties:
            requests:
              $ref: "#/$defs/ResourceQuantity"
            limits:
              $ref: "#/$defs/ResourceQuantity"
          default: {}
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 0
        resources:
          $ref: "#/$defs/ResourceRequirements"
        imagePullPolicy:
          type: string
          default: IfNotPresent
          enum:
            - Always
            - IfNotPresent
            - Never

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${environmentConfigs.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  resources:
                    requests:
                      cpu: ${environmentConfigs.resources.requests.cpu}
                      memory: ${environmentConfigs.resources.requests.memory}
                    limits:
                      cpu: ${environmentConfigs.resources.limits.cpu}
                      memory: ${environmentConfigs.resources.limits.memory}
